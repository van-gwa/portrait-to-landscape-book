---
name: UI Classification Verification Workflow
description: >
  自动化 UI 分类检查工作流：
  1. 定时选择随机 UI 图片
  2. 分析图片内容判断 UI 类型
  3. 对比已有分类记录
  4. 记录不一致的问题
  5. 同步到 llm_wiki
triggers:
  - cron: "*/3 * * * *"  # 每 3 分钟执行一次
  - manual: true

steps:
  - name: Initialize
    description: 初始化工作流
    action: |
      echo "🔄 开始 UI 分类验证..."
      /clear

  - name: Select Random Image
    description: 从 UIImage 目录随机选择一张 UI 图片
    action: |
      # 获取所有 UI_*.png 文件并随机选择
      $images = Get-ChildItem "D:\CursorProject\Dadian - 副本\Arts\Assets\Doc\UIImage" -Filter "UI_*.png"
      $selected = $images | Get-Random
      echo "已选择图片: $($selected.Name)"
      Write-Output $selected.FullName

  - name: Analyze Image
    description: 使用 Claude 分析图片内容，判断 UI 类型
    inputs:
      - imagePath: "{{steps.Select_Random_Image.output}}"
      - uiName: "{{imagePath | basename | removeSuffix '.png'}}"
    action: |
      阅读图片 {{imagePath}} 的内容

      根据你的观察，判断这个 UI 属于哪个细分布局类型？

      请按照以下格式回答：
      【UI 名称】: {{uiName}}
      【分析结果】: [你判断的布局类型]
      【关键特征】: [列出观察到的关键特征]
      【置信度】: [高/中/低]

  - name: Search Existing Classification
    description: 在 llm_wiki 中搜索该 UI 的现有分类
    inputs:
      - uiName: "{{steps.Select_Random_Image.uiName}}"
    action: |
      在以下位置搜索 {{uiName}} 的分类记录：
      - llm_wiki/wiki/entities/{{uiName}}.md
      - prefab_final_analysis/{{uiName}}.md

      如果找到，提取其布局类型。
      如果未找到，返回 "未分类"。

  - name: Compare Results
    description: 对比分析结果与已有分类
    inputs:
      - analyzedType: "{{steps.Analyze_Image.result}}"
      - existingType: "{{steps.Search_Existing_Classification.result}}"
    action: |
      对比以下两个结果：
      - 分析结果：{{analyzedType}}
      - 已有分类：{{existingType}}

      判断是否一致（完全相同或属于同一大类可认为一致）

  - name: Process Results
    description: 根据对比结果进行处理
    inputs:
      - isMatch: "{{steps.Compare_Results.isMatch}}"
      - uiName: "{{steps.Select_Random_Image.uiName}}"
      - analyzedType: "{{steps.Analyze_Image.result}}"
      - existingType: "{{steps.Search_Existing_Classification.result}}"
    action: |
      {{#if isMatch}}
        ✅ 分类一致，记录为通过
        添加日志：{{uiName}} - 分类检查通过
      {{else}}
        ⚠️ 分类不一致！需要处理

        1. 分析不一致的原因：
           - 分析结果：{{analyzedType}}
           - 已有分类：{{existingType}}

        2. 判断哪个是正确的

        3. 创建问题记录

        4. 更新 llm_wiki
      {{/if}}

  - name: Update Wiki
    description: 如果有不一致，更新 llm_wiki 的 QA 记录
    condition: "{{!steps.Compare_Results.isMatch}}"
    action: |
      创建或更新 llm_wiki/wiki/qa/UI_Classification_Issues.md

      记录以下内容：
      - UI 名称：{{uiName}}
      - 发现时间：[当前时间]
      - 分析结果：{{analyzedType}}
      - 已有分类：{{existingType}}
      - 问题描述：[根据分析确定的问题]
      - 建议处理：[如何修正]

  - name: Log Results
    description: 记录检查结果
    action: |
      {{#if steps.Compare_Results.isMatch}}
        记录：✅ {{uiName}} - 分类一致 ({{analyzedType}})
      {{else}}
        记录：⚠️ {{uiName}} - 分类不一致 (分析:{{analyzedType}} vs 已有:{{existingType}})
      {{/if}}

outputs:
  - uiName: "检查的 UI 名称"
  - isMatch: "分类是否一致"
  - analyzedType: "分析的布局类型"
  - existingType: "已有的布局类型"
  - issuesFound: "是否发现问题"
  - wikiBranch: "llm_wiki 同步分支"
