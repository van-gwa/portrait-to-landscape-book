<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI 布局分类工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .toolbar {
            padding: 20px 40px;
            background: #f8f9fa;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }

        .toolbar input, .toolbar button, .toolbar select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
        }

        .toolbar button {
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-weight: 600;
        }

        .toolbar button:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .toolbar select {
            background: white;
        }

        .stats {
            margin-left: auto;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
        }

        .content {
            padding: 40px;
            margin-bottom: 100px;
        }

        .layout-group {
            margin-bottom: 50px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .group-header input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .group-title {
            flex: 1;
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .group-count {
            background: #e8eef7;
            color: #667eea;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .ui-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }

        .ui-card {
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px;
            overflow: hidden;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 2px solid transparent;
        }

        .ui-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .ui-card input[type="checkbox"] {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            z-index: 10;
        }

        .ui-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            background: #f0f0f0;
        }

        .ui-name {
            padding: 10px;
            font-size: 0.85em;
            color: #333;
            border-top: 1px solid #e0e0e0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ui-card.checked {
            border: 2px solid #667eea;
            background: #f0f4ff;
        }

        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 2px solid #e0e0e0;
            padding: 20px 40px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }

        .action-bar button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .modal-content textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .close {
            color: #999;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: #333;
        }

        .toast {
            position: fixed;
            bottom: 120px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 15px 25px;
            border-radius: 6px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 2000;
        }

        @media (max-width: 768px) {
            .ui-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }

            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .stats {
                margin-left: 0;
                width: 100%;
                justify-content: space-around;
            }

            .action-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 UI 布局分类工具</h1>
            <p>选择和分组具有相似布局的界面</p>
        </header>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="搜索 UI 名称...">
            <button onclick="selectAll()">全选</button>
            <button onclick="deselectAll()">取消全选</button>
            <button onclick="resetGroups()">重置分组</button>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="selectedCount">0</div>
                    <div class="stat-label">已选</div>
                </div>
            </div>
        </div>

        <div class="content" id="content">
            <div style="text-align: center; padding: 60px 20px; color: #999;">
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <div class="action-bar">
        <button class="btn-secondary" onclick="exportJSON()">📥 导出 JSON</button>
        <button class="btn-secondary" onclick="exportCSV()">📊 导出 CSV</button>
        <button class="btn-primary" onclick="showResults()">✅ 查看结果</button>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>分类结果</h2>
            <textarea id="resultText" readonly></textarea>
            <div class="modal-buttons">
                <button class="btn-secondary" onclick="copyToClipboard()">复制</button>
                <button class="btn-secondary" onclick="downloadResult()">下载</button>
                <button class="btn-primary" onclick="closeModal()">关闭</button>
            </div>
        </div>
    </div>

        let classifications = {};

        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
        });

        function initializeApp() {
            // 从 localStorage 恢复或创建新的分组
            const saved = localStorage.getItem('uiClassifications');
            if (saved) {
                try {
                    classifications = JSON.parse(saved);
                } catch (e) {
                    createDefaultGroups();
                }
            } else {
                createDefaultGroups();
            }
            renderUI();
            updateStats();
        }

        function createDefaultGroups() {
            classifications = {};
            const groupSize = 15;
            for (let i = 0; i < ALL_UIS.length; i += groupSize) {
                const groupNum = Math.floor(i / groupSize) + 1;
                const groupName = 'Group ' + groupNum;
                classifications[groupName] = ALL_UIS.slice(i, i + groupSize);
            }
        }

        function renderUI() {
            const content = document.getElementById('content');
            content.innerHTML = '';

            Object.entries(classifications).forEach(([groupName, uiList]) => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'layout-group';

                const headerDiv = document.createElement('div');
                headerDiv.className = 'group-header';

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.onchange = function() {
                    const uiCheckboxes = groupDiv.querySelectorAll('.ui-card input[type="checkbox"]');
                    uiCheckboxes.forEach(cb => cb.checked = this.checked);
                    updateStats();
                };

                const title = document.createElement('div');
                title.className = 'group-title';
                title.textContent = groupName;

                const count = document.createElement('div');
                count.className = 'group-count';
                count.textContent = uiList.length + ' 个 UI';

                headerDiv.appendChild(checkbox);
                headerDiv.appendChild(title);
                headerDiv.appendChild(count);
                groupDiv.appendChild(headerDiv);

                const grid = document.createElement('div');
                grid.className = 'ui-grid';

                uiList.forEach(uiName => {
                    const card = document.createElement('div');
                    card.className = 'ui-card';

                    const cb = document.createElement('input');
                    cb.type = 'checkbox';
                    cb.onchange = function() {
                        updateStats();
                        if (this.checked) {
                            card.classList.add('checked');
                        } else {
                            card.classList.remove('checked');
                        }
                    };

                    const img = document.createElement('img');
                    img.src = UI_IMAGES_PATH + uiName + '.png';
                    img.alt = uiName;
                    img.onerror = function() { this.style.opacity = '0.3'; };

                    const name = document.createElement('div');
                    name.className = 'ui-name';
                    name.textContent = uiName;

                    card.appendChild(cb);
                    card.appendChild(img);
                    card.appendChild(name);
                    grid.appendChild(card);
                });

                groupDiv.appendChild(grid);
                content.appendChild(groupDiv);
            });
        }

        function updateStats() {
            const total = Object.values(classifications).flat().length;
            const selected = document.querySelectorAll('.ui-card input[type="checkbox"]:checked').length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('selectedCount').textContent = selected;
        }

        function selectAll() {
            document.querySelectorAll('.ui-card input[type="checkbox"]').forEach(cb => cb.checked = true);
            document.querySelectorAll('.ui-card').forEach(card => card.classList.add('checked'));
            updateStats();
        }

        function deselectAll() {
            document.querySelectorAll('.ui-card input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.querySelectorAll('.ui-card').forEach(card => card.classList.remove('checked'));
            updateStats();
        }

        function resetGroups() {
            if (confirm('确定要重置所有分组吗？')) {
                localStorage.removeItem('uiClassifications');
                createDefaultGroups();
                renderUI();
                updateStats();
            }
        }

        function showResults() {
            const results = {};
            document.querySelectorAll('.layout-group').forEach(group => {
                const groupName = group.querySelector('.group-title').textContent;
                const checkedUIs = Array.from(group.querySelectorAll('.ui-card input[type="checkbox"]:checked'))
                    .map(cb => cb.parentElement.querySelector('.ui-name').textContent);
                if (checkedUIs.length > 0) {
                    results[groupName] = checkedUIs;
                }
            });
            document.getElementById('resultText').value = JSON.stringify(results, null, 2);
            document.getElementById('resultModal').style.display = 'block';
        }

        function exportJSON() {
            const results = {};
            document.querySelectorAll('.layout-group').forEach(group => {
                const groupName = group.querySelector('.group-title').textContent;
                const checkedUIs = Array.from(group.querySelectorAll('.ui-card input[type="checkbox"]:checked'))
                    .map(cb => cb.parentElement.querySelector('.ui-name').textContent);
                if (checkedUIs.length > 0) {
                    results[groupName] = checkedUIs;
                }
            });
            const dataStr = JSON.stringify(results, null, 2);
            downloadFile(dataStr, 'ui_classifications.json', 'application/json');
        }

        function exportCSV() {
            let csv = 'Group,UI Name\n';
            document.querySelectorAll('.layout-group').forEach(group => {
                const groupName = group.querySelector('.group-title').textContent;
                const checkedUIs = Array.from(group.querySelectorAll('.ui-card input[type="checkbox"]:checked'))
                    .map(cb => cb.parentElement.querySelector('.ui-name').textContent);
                checkedUIs.forEach(ui => {
                    csv += '"' + groupName + '","' + ui + '"\n';
                });
            });
            downloadFile(csv, 'ui_classifications.csv', 'text/csv;charset=utf-8;');
        }

        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type: type });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
            showToast('已下载: ' + filename);
        }

        function copyToClipboard() {
            const text = document.getElementById('resultText');
            text.select();
            document.execCommand('copy');
            showToast('已复制到剪贴板');
        }

        function downloadResult() {
            const text = document.getElementById('resultText').value;
            downloadFile(text, 'ui_classifications.json', 'application/json');
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('resultModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
